services:
  pob-engine:
    build: .
    ports:
      - "4317:7860"
    environment:
      ENGINE_TOKEN: ${ENGINE_TOKEN:-local-development-token}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      POB_ASYNC_QUEUE_PREFIX: ${POB_ASYNC_QUEUE_PREFIX:-poe-upgrade-optimizer:v1}
      POB_ASYNC_JOB_TTL_SECONDS: ${POB_ASYNC_JOB_TTL_SECONDS:-86400}
      POB_ASYNC_WORKER_CONCURRENCY: ${POB_ASYNC_WORKER_CONCURRENCY:-1}
