name: Deploy PoB engine

on:
  push:
    branches:
      - main
    paths:
      - pob-engine/**
      - .github/workflows/deploy-pob-engine.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pob-engine-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test PoB engine protocol
        run: npm run test:engine

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Upload engine to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: rigriffin/poe-upgrade-optimizer-engine
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: pob-engine
          private: true
